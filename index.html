    <style>
        :root {
            --bg-body: #020617;
            --bg-panel: rgba(15, 23, 42, 0.7);
            --border-color: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-emerald: #34d399;
            --accent-indigo: #6366f1;
            --glass-blur: 16px;

            --nav-active-text: #818cf8;
            --shadow-glow: 0 0 15px rgba(99, 102, 241, 0.15);
        }

        body.light-theme {
            --bg-body: #f1f5f9;
            --bg-panel: rgba(255, 255, 255, 0.85);
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-emerald: #10b981;
            --accent-indigo: #4338ca;
            --nav-active-bg: #ede9fe;
            --nav-active-text: #4338ca;
            --shadow-glow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-glow);
            transition: all 0.3s ease;
        }

        /* Nav Tabs */
        .room-tab {
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .room-tab.active {
            background: var(--nav-active-bg);
            color: var(--nav-active-text);
            border-color: var(--accent-indigo);
            font-weight: 600;
        }

        

        /* Interactive Options */
        .option-wrapper {
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .option-wrapper:hover {
            border-color: var(--accent-indigo);
            transform: translateY(-1px);
        }
        .option-wrapper input:checked + div {
            color: var(--accent-indigo);
            font-weight: 600;
        }
        
        /* Submission States */
        .badge-pass {
            border-color: var(--accent-emerald) !important;
            background: rgba(52, 211, 153, 0.1) !important;
        }
        .badge-fail {
            border-color: #ef4444 !important;
            background: rgba(239, 68, 68, 0.1) !important;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--accent-indigo), var(--accent-emerald));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

        // =====================================================================
        // APP LOGIC
        // =====================================================================
        const state = {
            currentRoom: null,
            answers: {},      
            evaluated: {},    
            globalScore: { totalAttempted: 0, totalCorrect: 0 }
        };

        const navContainer = document.getElementById('navbar-rooms-container');
        const formContainer = document.getElementById('exam-form');
        const roomBanner = document.getElementById('room-banner');
        const submitContainer = document.getElementById('submit-container');
        const submitBtn = document.getElementById('submit-exam-btn');
        const themeBtn = document.getElementById('theme-toggle');
        const globalScoreEl = document.getElementById('global-score');
        const navPrev = document.getElementById('nav-prev');
        const navNext = document.getElementById('nav-next');
        const navCounter = document.getElementById('nav-counter');
        const navProgress = document.getElementById('nav-progress');

        // وظيفة مهمة جداً: معالجة الرموز المزدوجة \ علشان MathJax يقدر يقرأها صح
        function fixLatexEscaping(str) {
            if (!str) return '';
            return str.replace(/\\\\/g, '\\');
        }

        let isLight = false;
        themeBtn.addEventListener('click', () => {
            isLight = !isLight;
            document.body.classList.toggle('light-theme', isLight);
            themeBtn.innerHTML = isLight ? '🌙 Dark' : '☀️ Light';
        });

        function initApp() {
            Object.keys(examQuestions).forEach((roomId, index) => {
                state.answers[roomId] = {};
                state.evaluated[roomId] = false;
                
                const btn = document.createElement('button');
                btn.className = `room-tab px-5 py-2.5 rounded-xl font-medium text-sm glass-panel border ${index === 0 ? 'active' : ''}`;
                btn.innerText = examQuestions[roomId].title;
                btn.onclick = () => loadRoom(roomId, btn);
                navContainer.appendChild(btn);
                
                if (index === 0) loadRoom(roomId, btn);
            });
        }

        function loadRoom(roomId, btnElement) {
            state.currentRoom = roomId;
            
            document.querySelectorAll('.room-tab').forEach(b => b.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');
            
            formContainer.innerHTML = '';
            formContainer.classList.remove('fade-in');
            void formContainer.offsetWidth; 
            formContainer.classList.add('fade-in');
            
            const isEvaluated = state.evaluated[roomId];
            const questions = examQuestions[roomId].questions;

            if(questions.length === 0) {
                formContainer.innerHTML = `<div class="text-center py-10 text-[var(--text-muted)] font-bold">لا توجد أسئلة متاحة.</div>`;
                updateSubmitUI();
                return;
            }
            
            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.id = `qcard-${index}`;
                card.className = 'glass-panel rounded-2xl p-6 transition-all duration-300 relative overflow-hidden question-card';
                
                // تطبيق المعالجة على نص السؤال
                const processedText = fixLatexEscaping(q.text);

                const header = document.createElement('div');
                header.className = 'flex items-center gap-3 mb-4';
                header.innerHTML = `
                    <span class="flex items-center justify-center w-8 h-8 rounded-lg bg-[var(--bg-body)] border border-[var(--accent-indigo)] text-[var(--accent-indigo)] font-bold text-sm">
                        ${index + 1}
                    </span>
                    <h3 class="text-lg font-medium leading-relaxed flex-grow text-wrap">${processedText}</h3>
                `;
                card.appendChild(header);

                if (q.type === 'mcq' || q.type === 'tf') {
                    const gridClass = q.type === 'tf' ? 'grid-cols-2' : 'grid-cols-1 sm:grid-cols-2';
                    const optionsContainer = document.createElement('div');
                    optionsContainer.className = `grid ${gridClass} gap-3 mt-4`;
                    
                    q.options.forEach((opt, optIndex) => {
                        const isChecked = state.answers[roomId][index] === optIndex;
                        const wrapper = document.createElement('label');
                        wrapper.className = `option-wrapper flex items-center p-4 rounded-xl cursor-pointer relative ${isEvaluated && isChecked ? 'ring-2 ring-indigo-500' : ''}`;
                        
                        const input = document.createElement('input');
                        input.type = 'radio';
                        input.name = `q-${roomId}-${index}`;
                        input.value = optIndex;
                        input.className = 'hidden';
                        input.checked = isChecked;
                        input.disabled = isEvaluated;
                        
                        input.addEventListener('change', () => {
                            state.answers[roomId][index] = optIndex;
                            updateProgress();
                        });

                        // تطبيق المعالجة على الاختيارات
                        const processedOpt = fixLatexEscaping(opt);

                        const textDiv = document.createElement('div');
                        textDiv.className = 'flex-grow text-[var(--text-main)] text-sm';
                        textDiv.innerHTML = processedOpt;
                        
                        if (isEvaluated) {
                            if (optIndex === q.correct) {
                                wrapper.classList.add('badge-pass');
                            } else if (isChecked && optIndex !== q.correct) {
                                wrapper.classList.add('badge-fail');
                            }
                        }

                        wrapper.appendChild(input);
                        wrapper.appendChild(textDiv);
                        optionsContainer.appendChild(wrapper);
                    });
                    card.appendChild(optionsContainer);
                    
                } else if (q.type === 'subjective') {
                    const textArea = document.createElement('textarea');
                    textArea.className = 'w-full h-32 p-4 mt-2 bg-[var(--bg-body)] border border-[var(--border-color)] rounded-xl font-code text-sm text-[var(--text-main)] focus:outline-none focus:border-[var(--accent-indigo)] transition-colors resize-none';
                    textArea.placeholder = "Formulate your mathematical proof or logic here...";
                    textArea.value = state.answers[roomId][index] || '';
                    textArea.disabled = isEvaluated;
                    
                    textArea.addEventListener('input', (e) => {
                        state.answers[roomId][index] = e.target.value;
                        updateProgress();
                    });
                    card.appendChild(textArea);
                }

                if (isEvaluated) {
                    const expBox = document.createElement('div');
                    const explanationText = examExplanations[roomId]?.[index] || "لم يتم توفير شرح في قاعدة البيانات.";
                    
                    if (q.type === 'mcq' || q.type === 'tf') {
                        expBox.className = 'mt-4 p-4 rounded-xl bg-[var(--bg-body)] border border-[var(--accent-indigo)] text-sm fade-in opacity-90 border-l-4 border-l-[var(--accent-indigo)]';
                        expBox.innerHTML = `<strong class="text-[var(--accent-indigo)] block mb-1">Explanation:</strong> ${fixLatexEscaping(explanationText)}`;
                    } else if (q.type === 'subjective') {
                        expBox.className = 'mt-4 p-4 rounded-xl badge-pass border text-sm font-code flex flex-col gap-2 fade-in';
                        expBox.innerHTML = `<strong class="text-[var(--accent-emerald)] font-sans">Ideal Solution / Grading Key:</strong><span class="whitespace-pre-wrap">${fixLatexEscaping(explanationText)}</span>`;
                    }
                    card.appendChild(expBox);
                }

                formContainer.appendChild(card);
            });

            // تفعيل مكتبة MathJax بعد ما رصينا كل الداتا المعالجة في الصفحة
            MathJax.typesetPromise([formContainer]);
            
            updateSubmitUI();
            updateProgress();
            setupIntersectionObserver();
        }

        submitBtn.addEventListener('click', () => {
            const roomId = state.currentRoom;
            if (state.evaluated[roomId]) return;
            
            const questions = examQuestions[roomId].questions;
            let correct = 0;
            let totalObjective = 0;

            questions.forEach((q, index) => {
                if (q.type === 'mcq' || q.type === 'tf') {
                    totalObjective++;
                    if (state.answers[roomId][index] === q.correct) {
                        correct++;
                        state.globalScore.totalCorrect++;
                    }
                    state.globalScore.totalAttempted++;
                }
            });

            state.evaluated[roomId] = true;
            
            const perc = state.globalScore.totalAttempted === 0 ? 0 : Math.round((state.globalScore.totalCorrect / state.globalScore.totalAttempted) * 100);
            globalScoreEl.innerText = `${perc}%`;

            loadRoom(roomId, document.querySelector('.room-tab.active'));

            roomBanner.innerHTML = `
                <h2 class="text-2xl font-bold gradient-text mb-2">Room Completed!</h2>
                <p class="text-[var(--text-main)]">You scored <strong>${correct}</strong> out of <strong>${totalObjective}</strong> strictly evaluated items.</p>
                <p class="text-xs text-[var(--text-muted)] mt-2">Subjective responses have been unlocked with ideal grading keys for self-assessment.</p>
            `;
            roomBanner.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        function updateSubmitUI() {
            const roomId = state.currentRoom;
            const hasQuestions = examQuestions[roomId].questions.length > 0;
            if (state.evaluated[roomId] || !hasQuestions) {
                submitContainer.classList.add('hidden');
            } else {
                submitContainer.classList.remove('hidden');
                roomBanner.classList.add('hidden');
            }
        }

        let currentScrollIndex = 0;
        function updateProgress() {
            const roomId = state.currentRoom;
            const total = examQuestions[roomId].questions.length;
            if(total === 0) return;
            
            const answered = Object.keys(state.answers[roomId]).filter(k => {
                const val = state.answers[roomId][k];
                return val !== undefined && val !== '';
            }).length;
            
            navCounter.innerText = `Question ${currentScrollIndex + 1} / ${total}`;
            navProgress.style.width = `${(answered / total) * 100}%`;
        }

        function setupIntersectionObserver() {
            const cards = document.querySelectorAll('.question-card');
            const options = { root: null, rootMargin: '0px', threshold: 0.5 };
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id;
                        currentScrollIndex = parseInt(id.replace('qcard-', ''));
                        updateProgress();
                    }
                });
            }, options);

            cards.forEach(card => observer.observe(card));
        }

        navPrev.addEventListener('click', () => {
            if (currentScrollIndex > 0) {
                document.getElementById(`qcard-${currentScrollIndex - 1}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });

        navNext.addEventListener('click', () => {
            const total = examQuestions[state.currentRoom].questions.length;
            if (currentScrollIndex < total - 1) {
                document.getElementById(`qcard-${currentScrollIndex + 1}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
